packages:
  - apps/*
  - packages/*

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

injectWorkspacePackages: true
minimumReleaseAgeExclude:
  - prettier@3.9.5
  - "@aws-sdk/client-s3@3.1086.0"
  - "@aws-sdk/credential-provider-node@3.972.67"
syncInjectedDepsAfterScripts:
  - build
