services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kagura_blog_smoke
      POSTGRES_USER: kagura
      POSTGRES_PASSWORD: smoke_only_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kagura -d kagura_blog_smoke"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [smoke]

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [smoke]

  migrate:
    image: kagura-blog-worker:smoke
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    command: ["node", "dist/migrate.js"]
    environment: &runtime-env
      NODE_ENV: production
      APP_URL: https://smoke.invalid
      APP_TIMEZONE: Asia/Shanghai
      APP_RELEASE: smoke
      LOG_LEVEL: info
      DATABASE_URL: postgresql://kagura:smoke_only_password@postgres:5432/kagura_blog_smoke
      REDIS_URL: redis://redis:6379/0
      MIGRATIONS_DIR: /app/drizzle
      SESSION_SECRET: smoke_only_session_secret_not_for_production
      SESSION_COOKIE_NAME: kagura_smoke_session
      SESSION_TTL_HOURS: 24
      R2_ENDPOINT: https://smoke.invalid
      R2_REGION: auto
      R2_BUCKET: kagura-assets
      R2_PUBLIC_BASE_URL: https://assets.smoke.invalid
      R2_ACCESS_KEY_ID: smoke-only-access-key
      R2_SECRET_ACCESS_KEY: smoke-only-secret-key
      R2_FORCE_PATH_STYLE: false
      MEDIA_MAX_BYTES: 10485760
      MEDIA_MAX_DIMENSION: 8192
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [smoke]

  web:
    image: kagura-blog-web:smoke
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment: *runtime-env
    depends_on:
      migrate: { condition: service_completed_successfully }
    networks: [smoke]

  worker:
    image: kagura-blog-worker:smoke
    environment:
      <<: *runtime-env
      WORKER_HEALTH_PORT: 3001
      HOTSPOT_COLLECTION_ENABLED: "false"
    depends_on:
      migrate: { condition: service_completed_successfully }
    networks: [smoke]

  smoke:
    image: node:22.23.1-alpine
    working_dir: /verify
    command: ["node", "verify-containers.mjs"]
    volumes:
      - ../scripts/verify-containers.mjs:/verify/verify-containers.mjs:ro
    depends_on:
      web: { condition: service_healthy }
      worker: { condition: service_healthy }
    networks: [smoke]

networks:
  smoke:
    name: kagura-blog-smoke
