name: kagura-blog-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: kagura-blog-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kagura_blog}
      POSTGRES_USER: ${POSTGRES_USER:-kagura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 12
    networks: [kagura-blog-prod]
    mem_limit: 512m
    logging: &json-logs
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7.4-alpine
    container_name: kagura-blog-prod-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
    networks: [kagura-blog-prod]
    mem_limit: 192m
    logging: *json-logs

  migrate:
    image: ${WORKER_IMAGE:?WORKER_IMAGE is required}
    container_name: kagura-blog-prod-migrate
    command: ["node", "dist/migrate.js"]
    env_file: .env
    environment:
      MIGRATIONS_DIR: /app/drizzle
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [kagura-blog-prod]
    logging: *json-logs

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    container_name: kagura-blog-prod-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "${WEB_BIND:-0.0.0.0:3080}:3000"
    depends_on:
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
    networks: [kagura-blog-prod]
    mem_limit: 768m
    logging: *json-logs

  worker:
    image: ${WORKER_IMAGE:?WORKER_IMAGE is required}
    container_name: kagura-blog-prod-worker
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-3001}
    depends_on:
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
    networks: [kagura-blog-prod]
    mem_limit: 384m
    logging: *json-logs

volumes:
  postgres-data:
    name: kagura-blog-prod-postgres-data

networks:
  kagura-blog-prod:
    name: kagura-blog-prod
