name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: kagura_blog_test
          POSTGRES_USER: kagura
          POSTGRES_PASSWORD: ci_only_password
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U kagura -d kagura_blog_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7.4-alpine
        ports: ["56379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      NODE_ENV: test
      APP_URL: http://127.0.0.1:3000
      APP_TIMEZONE: Asia/Shanghai
      APP_RELEASE: ${{ github.sha }}
      LOG_LEVEL: info
      DATABASE_URL: postgresql://kagura:ci_only_password@127.0.0.1:55432/kagura_blog_test
      TEST_DATABASE_URL: postgresql://kagura:ci_only_password@127.0.0.1:55432/kagura_blog_test
      REDIS_URL: redis://127.0.0.1:56379/0
      TEST_REDIS_URL: redis://127.0.0.1:56379/1
      SESSION_SECRET: ci_only_session_secret_not_for_production
      SESSION_COOKIE_NAME: kagura_ci_session
      SESSION_TTL_HOURS: 24
      R2_ENDPOINT: http://127.0.0.1:59000
      R2_REGION: us-east-1
      R2_BUCKET: kagura-assets
      R2_PUBLIC_BASE_URL: http://127.0.0.1:59000/kagura-assets
      R2_ACCESS_KEY_ID: ci-only-access-key
      R2_SECRET_ACCESS_KEY: ci-only-secret-key
      R2_FORCE_PATH_STYLE: true
      MEDIA_MAX_BYTES: 10485760
      MEDIA_MAX_DIMENSION: 8192
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-blog-browser-captures
          path: apps/web/test-results/**/*.png
          if-no-files-found: ignore
          retention-days: 5
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-results
          path: apps/web/test-results
          if-no-files-found: ignore
          retention-days: 5

  container-smoke:
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm containers:smoke
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-smoke-logs
          path: container-smoke.log
          retention-days: 3
